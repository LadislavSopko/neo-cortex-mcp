<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Neural connections -->
  <line x1="32" y1="12" x2="16" y2="28" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="12" x2="48" y2="28" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="28" x2="12" y2="48" stroke="#6d28d9" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="28" x2="32" y2="44" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <line x1="48" y1="28" x2="52" y2="48" stroke="#6d28d9" stroke-width="1.5" opacity="0.5"/>
  <line x1="48" y1="28" x2="32" y2="44" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="44" x2="12" y2="48" stroke="#6d28d9" stroke-width="1.5" opacity="0.4"/>
  <line x1="32" y1="44" x2="52" y2="48" stroke="#6d28d9" stroke-width="1.5" opacity="0.4"/>
  <line x1="16" y1="28" x2="48" y2="28" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="32" cy="12" r="5" fill="#8b5cf6"/>
  <circle cx="16" cy="28" r="4" fill="#a78bfa"/>
  <circle cx="48" cy="28" r="4" fill="#a78bfa"/>
  <circle cx="32" cy="44" r="5" fill="#8b5cf6"/>
  <circle cx="12" cy="48" r="3" fill="#c4b5fd"/>
  <circle cx="52" cy="48" r="3" fill="#c4b5fd"/>
  <!-- Center pulse -->
  <circle cx="32" cy="28" r="3" fill="#7c3aed" opacity="0.8">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
